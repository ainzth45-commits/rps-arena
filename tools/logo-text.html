<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;background:transparent}
  .wrap{display:inline-block;padding:60px 80px}
  .line{position:relative;font-family:"Mitr";font-weight:700;line-height:1.15;white-space:nowrap;text-align:center}
  .l1{font-size:150px}
  .l2{font-size:190px}
  .layer{position:absolute;inset:0;}
  .stroke-cream{-webkit-text-stroke:38px #FFF6E0;paint-order:stroke fill;color:#FFF6E0}
  .stroke-navy{-webkit-text-stroke:20px #16205c;paint-order:stroke fill;color:#16205c}
  .fill{position:relative;background:linear-gradient(180deg,#FFE87A 0%,#FFD23F 55%,#F0A81E 100%);
        -webkit-background-clip:text;background-clip:text;color:transparent}
  .shadow{filter:drop-shadow(0 16px 0 rgba(10,14,50,.85))}
</style></head><body>
<div class="wrap shadow">
  <div class="line l1">
    <span class="layer stroke-cream">เป่า ยิ้ง ฉุบ!</span>
    <span class="layer stroke-navy">เป่า ยิ้ง ฉุบ!</span>
    <span class="fill">เป่า ยิ้ง ฉุบ!</span>
  </div>
  <div class="line l2">
    <span class="layer stroke-cream">อารีน่า!</span>
    <span class="layer stroke-navy">อารีน่า!</span>
    <span class="fill">อารีน่า!</span>
  </div>
</div></body></html>
